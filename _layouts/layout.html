
<!DOCTYPE html>
<!--[if IE 8]> <html lang="en" class="ie8"> <![endif]-->
<!--[if IE 9]> <html lang="en" class="ie9"> <![endif]-->
<!--[if !IE]><!--> <html lang="en"> <!--<![endif]-->
{% include head.html %}
<body>
	<div class="container">

		<div class="row">

			{% include introduction.html %}
			<hr>

			<nav class="section-nav" role="tablist" aria-label="Sections">
				<button type="button" class="section-btn" data-target="section-news" aria-expanded="false" aria-controls="section-news">
					<i class="fa fa-bullhorn"></i> News
				</button>
				<button type="button" class="section-btn" data-target="section-students" aria-expanded="false" aria-controls="section-students">
					<i class="fa fa-users"></i> Team Members
				</button>
				<button type="button" class="section-btn" data-target="section-publications" aria-expanded="false" aria-controls="section-publications">
					<i class="fa fa-book"></i> Selected Publications
				</button>
				<button type="button" class="section-btn" data-target="section-teachings" aria-expanded="false" aria-controls="section-teachings">
					<i class="fa fa-graduation-cap"></i> Teachings
				</button>
				<button type="button" class="section-btn" data-target="section-activities" aria-expanded="false" aria-controls="section-activities">
					<i class="fa fa-flag-checkered"></i> Professional Activities
				</button>
			</nav>

			<section id="section-news" class="collapsible-section" hidden>
				<hr>
				{% include news.html %}
			</section>
			<section id="section-students" class="collapsible-section" hidden>
				<hr>
				{% include students.html %}
			</section>
			<section id="section-publications" class="collapsible-section" hidden>
				<hr>
				{% include publication.html %}
			</section>
			<section id="section-teachings" class="collapsible-section" hidden>
				<hr>
				{% include teachings.html %}
			</section>
			<section id="section-activities" class="collapsible-section" hidden>
				<hr>
				{% include activities.html %}
			</section>

		</div><!--//row-->
	</div><!--//main-body-->

	<div style="display:inline-block;width:200px;">
		<script type="text/javascript" src="//rf.revolvermaps.com/0/0/8.js?i=52kjaog3f7q&amp;m=7&amp;c=ff0000&amp;cr1=ff007e&amp;f=arial&amp;l=33" async="async"></script>
	</div>

	<script>
		(function () {
			var buttons = document.querySelectorAll('.section-btn');
			var sections = document.querySelectorAll('.collapsible-section');

			function hideAll() {
				sections.forEach(function (s) { s.hidden = true; });
				buttons.forEach(function (b) {
					b.classList.remove('active');
					b.setAttribute('aria-expanded', 'false');
				});
			}

			buttons.forEach(function (btn) {
				btn.addEventListener('click', function () {
					var targetId = btn.getAttribute('data-target');
					var target = document.getElementById(targetId);
					if (!target) return;

					var willOpen = btn.getAttribute('aria-expanded') !== 'true';
					hideAll();

					if (willOpen) {
						target.hidden = false;
						btn.classList.add('active');
						btn.setAttribute('aria-expanded', 'true');
						target.scrollIntoView({ behavior: 'smooth', block: 'start' });
					}
				});
			});
		})();
	</script>
</body>
</html>
